[package]
name = "sp-daemon"
version = "0.1.0"
edition = "2021"
description = "Shannon Prime L3 HTTP/SSE daemon — wraps the frozen L1 C ABI in a long-lived process (lat-phase-2-l3-core)"

[[bin]]
name = "sp-daemon"
path = "src/main.rs"

[dependencies]
axum        = { version = "0.7", features = ["macros"] }
tokio       = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures     = "0.3"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
tower-http  = { version = "0.5", features = ["trace"] }
tracing     = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap        = { version = "4", features = ["derive", "env"] }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[build-dependencies]
bindgen = "0.70"
